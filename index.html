function canonicalize(name) {
  if (!name) return '';
  const key = name.trim().toLowerCase();
  return ALIASES[key] || name.trim();
}

function nameMatches(rawName, query) {
  const canon = canonicalize(rawName).toLowerCase();
  const raw = (rawName || '').toLowerCase();
  const q = query.toLowerCase();
  return canon.includes(q) || raw.includes(q);
}

// ============================================================
// CSV PARSING
// ============================================================
let allData = null;
let loadTime = null;

function parseCSV(text) {
  const lines = text.split(/\r?\n/);
  const result = [];
  let inQuote = false;
  
  function parseLine(line) {
    const cells = [];
    let cell = '';
    for (let i = 0; i < line.length; i++) {
      if (line[i] === '"') {
        inQuote = !inQuote;
      } else if (line[i] === ',' && !inQuote) {
        cells.push(cell.trim());
        cell = '';
      } else {
        cell += line[i];
      }
    }
    cells.push(cell.trim());
    return cells;
  }

  for (const line of lines) {
    result.push(parseLine(line));
  }
  return result;
}

function extractRecords(rows) {
  const records = [];
  if (rows.length < 3) return records;

  const headerRow = rows[1];
  const monthRow  = rows[0];

  // Find all "Battle Brother" columns — each marks the start of a month block
  const monthStarts = [];
  for (let i = 0; i < headerRow.length; i++) {
    if (headerRow[i] && headerRow[i].toLowerCase().includes('battle brother')) {
      monthStarts.push(i);
    }
  }

  // For each block, detect exact column offsets by header name
  const blocks = [];
  for (let m = 0; m < monthStarts.length; m++) {
    const base = monthStarts[m];
    const end  = monthStarts[m + 1] || headerRow.length;

    // Get month label from row 0
    let label = '';
    for (let i = base; i >= 0; i--) {
      if (monthRow[i] && monthRow[i].trim()) { label = monthRow[i].trim(); break; }
    }

    // Map column names to offsets within this block
    const offsets = { brother: base };
    for (let c = base + 1; c < end; c++) {
      const h = (headerRow[c] || '').toLowerCase();
      if (h.includes('quest'))              offsets.quest    = c;
      if (h.includes('overseeing'))         offsets.overseer = c;
      if (h.includes('approved') || h.includes('declined')) offsets.status = c;
      if (h.includes('errors'))             offsets.errors   = c;
      if (h.includes('approving'))          offsets.approver = c;
    }

    blocks.push({ label, offsets });
  }

  for (let rowIdx = 2; rowIdx < rows.length; rowIdx++) {
    const row = rows[rowIdx];
    for (const block of blocks) {
      const o = block.offsets;
      const brother  = (o.brother  !== undefined ? row[o.brother]  : '').trim() || '';
      const quest    = (o.quest    !== undefined ? row[o.quest]    : '').trim() || '';
      const overseer = (o.overseer !== undefined ? row[o.overseer] : '').trim() || '';
      const status   = (o.status   !== undefined ? row[o.status]   : '').trim() || '';
      const errors   = (o.errors   !== undefined ? row[o.errors]   : '').trim() || '';
      const approver = (o.approver !== undefined ? row[o.approver] : '').trim() || '';
      const month    = block.label;

      if (!brother && !quest && !overseer && !approver) continue;

      records.push({ brother, quest, overseer, status, errors, approver, month });
    }
  }
  return records;
}

// LOAD DATA

async function loadData() {
  const status = document.getElementById('statusLine');
  status.className = 'status-line loading';
  status.textContent = 'Accessing chapter records...';

  try {
    const resp = await fetch(CSV_URL);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const text = await resp.text();
    const rows = parseCSV(text);
    allData = extractRecords(rows);
    loadTime = new Date();
    status.className = 'status-line success';
    status.textContent = `${allData.length} records loaded. Enter a name to search.`;
    document.getElementById('dataAge').textContent =
      `Records retrieved ${loadTime.toLocaleTimeString()}`;
  } catch(e) {
    status.className = 'status-line error';
    status.textContent = `Failed to load records: ${e.message}`;
  }
}

// ============================================================
// SEARCH
// ============================================================
function search() {
  const query = document.getElementById('nameInput').value.trim();
  const results = document.getElementById('results');

  if (!query) { results.innerHTML = ''; return; }
  if (!allData) {
    document.getElementById('statusLine').textContent = 'Records still loading — please wait.';
    return;
  }

  const asBrother  = allData.filter(r => nameMatches(r.brother,  query));
  const asOverseer = allData.filter(r => nameMatches(r.overseer, query));
  const asApprover = allData.filter(r => nameMatches(r.approver, query));

  const total = asBrother.length + asOverseer.length + asApprover.length;

  if (total === 0) {
    results.innerHTML = `
      <div class="no-results">
        <strong>No Records Found</strong>
        No Q&O entries matching "${query}" in the chapter records.
      </div>`;
    return;
  }

  // Stats
  const approved = asBrother.filter(r => r.status.toLowerCase().includes('approv')).length;
  const denied   = asBrother.filter(r => r.status.toLowerCase().includes('den')).length;
  const withErr  = asBrother.filter(r => r.errors && r.errors.toLowerCase() !== 'none' && r.errors !== '').length;

  const canonName = asBrother.length ? canonicalize(asBrother[0].brother) :
                    asOverseer.length ? canonicalize(asOverseer[0].overseer) :
                    canonicalize(asApprover[0].approver);

  let html = `
    <div class="results-header">
      <span class="results-name">${canonName}</span>
      <span class="results-count">${total} record${total !== 1 ? 's' : ''} found</span>
    </div>
    <div class="stats-bar">
      <div class="stat">
        <span class="stat-value">${asBrother.length}</span>
        <span class="stat-label">As Brother</span>
      </div>
      <div class="stat">
        <span class="stat-value">${asOverseer.length}</span>
        <span class="stat-label">Q&Os Overseen</span>
      </div>
      <div class="stat">
        <span class="stat-value">${asApprover.length}</span>
        <span class="stat-label">Q&Os Approved</span>
      </div>
      <div class="stat">
        <span class="stat-value" style="color:${withErr > 0 ? 'var(--error)' : 'var(--approved)'}">${withErr}</span>
        <span class="stat-label">With Errors</span>
      </div>
    </div>`;

  function renderTable(records, roleLabel) {
    if (!records.length) return '';
    return `
      <div class="section-title">${roleLabel} — ${records.length} entr${records.length !== 1 ? 'ies' : 'y'}</div>
      <table class="records-table">
        <thead>
          <tr>
            <th>Month</th>
            <th>Brother</th>
            <th>Quest</th>
            <th>Overseer</th>
            <th>Status</th>
            <th>Errors</th>
            <th>Approver</th>
          </tr>
        </thead>
        <tbody>
          ${records.map(r => `
            <tr>
              <td>${r.month ? (() => { const m = String(r.month); const match = m.match(/([A-Za-z]{3}[-\s]\d{2,4})/); return match ? match[1] : m.split(' ')[0] || '—'; })() : '—'}</td>
              <td>${r.brother || '—'}</td>
              <td>${r.quest || '—'}</td>
              <td>${r.overseer || '—'}</td>
              <td>${r.status ? `<span class="badge ${r.status.toLowerCase().includes('approv') ? 'badge-approved' : 'badge-denied'}">${r.status}</span>` : '—'}</td>
              <td>${r.errors && r.errors.toLowerCase() !== 'none' && r.errors !== '' ? `<span class="badge badge-errors">${r.errors}</span>` : '<span style="color:var(--parchment-dim)">—</span>'}</td>
              <td>${r.approver || '—'}</td>
            </tr>`).join('')}
        </tbody>
      </table>`;
  }

  html += renderTable(asBrother,  'Q&Os Submitted as Battle Brother');
  html += renderTable(asOverseer, 'Q&Os Overseen');
  html += renderTable(asApprover, 'Q&Os Approved');

  results.innerHTML = html;
}

// Enter key triggers search
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('nameInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') search();
  });
  loadData();
});
</script>
</body>
</html>
